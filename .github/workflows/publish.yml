name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # OIDC trusted publishing needs npm >= 11.5.1; Node 22 still bundles npm 10.9.x,
          # so use Node 24 (bundles npm 11.x)
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # prepublishOnly runs typecheck + tests + build before publishing
      - run: npm publish
